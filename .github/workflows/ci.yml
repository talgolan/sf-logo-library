# .github/workflows/ci.yml
name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Build
        run: bun run build

      - name: Unit & integration tests (Bun, with coverage)
        run: bun test --coverage

      - name: Server e2e smoke (7 tool calls over stdio)
        run: bun run phase2:smoke

      - name: MCP regression suite (assertive scenarios via SDK client)
        run: bun run try:check
